services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finca_db
      POSTGRES_USER: finca_user
      POSTGRES_PASSWORD: finca_db_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finca_user -d finca_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://finca_user:finca_db_pass@db:5432/finca_db
      JWT_SECRET: change_me_in_production_railway
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
